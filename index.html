<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./src/styles/main.css" />

    <title>FichaFit</title>
  </head>
  <body>
    <header class="header">
      <section class="hero-section">
        <div class="container">
          <div class="hero-content">
            <div class="hero-brand">
              <img
                src="./src/assets/images/logo-fichaFit.png"
                alt="Logo do FichaFit."
              />
              <h1>Ficha<span>Fit</span></h1>
            </div>
            <p class="hero-description">
              Organize seus treinos.
              <br />
              Evolua todos os dias.
            </p>
            <div class="hero-features">
              <article class="feature">
                <img
                  src="./src/assets/icons/calendar.svg"
                  alt=""
                  aria-hidden="true"
                />
                <p>Treinos organizados</p>
              </article>
              <article class="feature">
                <img
                  src="./src/assets/icons/graphic-progression.svg"
                  alt=""
                  aria-hidden="true"
                />
                <p>Acompanhe sua evolução</p>
              </article>
              <article class="feature">
                <img
                  src="./src/assets/icons/pdf-file.svg"
                  alt=""
                  aria-hidden="true"
                />
                <p>Gere seu PDF</p>
              </article>
              <article class="feature">
                <img
                  src="./src/assets/icons/cloud-up.svg"
                  alt=""
                  aria-hidden="true"
                />
                <p>Seus dados sempre salvos</p>
              </article>
            </div>
          </div>
        </div>
      </section>
    </header>
  </body>
</html>
